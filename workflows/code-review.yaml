# Code Review Workflow
# Reviews code files using multiple AI agents for comprehensive feedback

id: code-review
name: Code Review
version: '1.0'
description: Multi-agent code review with file reading and consolidated feedback
entryPoint: read-code

nodes:
  - id: read-code
    type: tool
    name: fsRead
    tool:
      name: fsRead
      params:
        filePath: '{{filePath}}'
    outputVar: code

  - id: gemini-review
    type: agent
    agent:
      provider: gemini
      role: architecture-reviewer
    prompt: |
      Review this code from an architecture and design perspective:
      
      ```
      {{code}}
      ```
      
      Focus on: design patterns, modularity, extensibility, and best practices.
    dependsOn: [read-code]
    outputVar: gemini-feedback

  - id: chatgpt-review
    type: agent
    agent:
      provider: chatgpt
      role: security-reviewer
    prompt: |
      Review this code for security issues and bugs:
      
      ```
      {{code}}
      ```
      
      Focus on: security vulnerabilities, potential bugs, edge cases, and error handling.
    dependsOn: [read-code]
    outputVar: chatgpt-feedback

  - id: claude-review
    type: agent
    agent:
      provider: claude
      role: readability-reviewer
    prompt: |
      Review this code for readability and maintainability:
      
      ```
      {{code}}
      ```
      
      Focus on: naming conventions, comments, code clarity, and documentation.
    dependsOn: [read-code]
    outputVar: claude-feedback

  - id: merge-reviews
    type: merge
    dependsOn: [gemini-review, chatgpt-review, claude-review]
    outputVar: all-feedback

  - id: save-review
    type: tool
    tool:
      name: fsWrite
      params:
        filePath: '{{reviewFilePath}}'
        content: |
          # Code Review Report
          
          ## Architecture Review (Gemini)
          {{gemini-feedback}}
          
          ## Security Review (ChatGPT)
          {{chatgpt-feedback}}
          
          ## Readability Review (Claude)
          {{claude-feedback}}
          
          ---
          Generated by AI Workbench
    dependsOn: [merge-reviews]
